services:
  openmodel:
    #image: ghcr.io/macedot/openmodel:latest
    build: .
    container_name: openmodel
    restart: unless-stopped
    ports:
      - "12345:12345"
    volumes:
      - ${HOME}/.config/openmodel/openmodel.json:/app/openmodel.json:ro
    environment:
      # Optional: Override log level/format from config
      - OPENMODEL_LOG_LEVEL=info
      - OPENMODEL_LOG_FORMAT=text
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:12345/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
