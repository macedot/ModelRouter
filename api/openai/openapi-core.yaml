    post:
      operationId: createChatCompletion
      tags:
      - Chat
      summary: '**Starting a new project?** We recommend trying [Responses](/docs/api-reference/responses)

        to take advantage of the latest OpenAI platform features. Compare

        [Chat Completions with Responses](/docs/guides/responses-vs-chat-completions?api-mode=responses).


        ---


        Creates a model response for the given chat conversation. Learn more in the

        [text generation](/docs/guides/text-generation), [vision](/docs/guides/vision),

        and [audio](/docs/guides/audio) guides.


        Parameter support can differ depending on the model used to generate the

        response, particularly for newer reasoning models. Parameters that are only

        supported for reasoning models are noted below. For the current state of

        unsupported parameters in reasoning models,

        [refer to the reasoning guide](/docs/guides/reasoning).


        Returns a chat completion object, or a streamed sequence of chat completion

        chunk objects if the request is streamed.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatCompletionResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/CreateChatCompletionStreamResponse'
      x-oaiMeta:
        name: Create chat completion
        group: chat
        path: create
        examples:
        - title: Default
          request:
            curl: "curl https://api.openai.com/v1/chat/completions \\\n  -H \"Content-Type:\
              \ application/json\" \\\n  -H \"Authorization: Bearer $OPENAI_API_KEY\"\
              \ \\\n  -d '{\n    \"model\": \"VAR_chat_model_id\",\n    \"messages\"\
              : [\n      {\n        \"role\": \"developer\",\n        \"content\"\
              : \"You are a helpful assistant.\"\n      },\n      {\n        \"role\"\
              : \"user\",\n        \"content\": \"Hello!\"\n      }\n    ]\n  }'\n"
            python: "import os\nfrom openai import OpenAI\n\nclient = OpenAI(\n  \
              \  api_key=os.environ.get(\"OPENAI_API_KEY\"),  # This is the default\
              \ and can be omitted\n)\nchat_completion = client.chat.completions.create(\n\
              \    messages=[{\n        \"content\": \"string\",\n        \"role\"\
              : \"developer\",\n    }],\n    model=\"gpt-4o\",\n)\nprint(chat_completion)"
            javascript: "import OpenAI from \"openai\";\n\nconst openai = new OpenAI();\n\
              \nasync function main() {\n  const completion = await openai.chat.completions.create({\n\
              \    messages: [{ role: \"developer\", content: \"You are a helpful\
              \ assistant.\" }],\n    model: \"VAR_chat_model_id\",\n    store: true,\n\
              \  });\n\n  console.log(completion.choices[0]);\n}\n\nmain();\n"
            csharp: "using System;\nusing System.Collections.Generic;\n\nusing OpenAI.Chat;\n\
              \nChatClient client = new(\n    model: \"gpt-4.1\",\n    apiKey: Environment.GetEnvironmentVariable(\"\
              OPENAI_API_KEY\")\n);\n\nList<ChatMessage> messages =\n[\n    new SystemChatMessage(\"\
              You are a helpful assistant.\"),\n    new UserChatMessage(\"Hello!\"\
              )\n];\n\nChatCompletion completion = client.CompleteChat(messages);\n\
              \nConsole.WriteLine(completion.Content[0].Text);\n"
            node.js: "import OpenAI from 'openai';\n\nconst client = new OpenAI({\n\
              \  apiKey: process.env['OPENAI_API_KEY'], // This is the default and\
              \ can be omitted\n});\n\nconst chatCompletion = await client.chat.completions.create({\n\
              \  messages: [{ content: 'string', role: 'developer' }],\n  model: 'gpt-4o',\n\
              });\n\nconsole.log(chatCompletion);"
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\
              \n\t\"github.com/openai/openai-go/option\"\n\t\"github.com/openai/openai-go/shared\"\
              \n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"\
              My API Key\"),\n\t)\n\tchatCompletion, err := client.Chat.Completions.New(context.TODO(),\
              \ openai.ChatCompletionNewParams{\n\t\tMessages: []openai.ChatCompletionMessageParamUnion{{\n\
              \t\t\tOfDeveloper: &openai.ChatCompletionDeveloperMessageParam{\n\t\t\
              \t\tContent: openai.ChatCompletionDeveloperMessageParamContentUnion{\n\
              \t\t\t\t\tOfString: openai.String(\"string\"),\n\t\t\t\t},\n\t\t\t},\n\
              \t\t}},\n\t\tModel: shared.ChatModelGPT4o,\n\t})\n\tif err != nil {\n\
              \t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", chatCompletion)\n\
              }\n"
            java: "package com.openai.example;\n\nimport com.openai.client.OpenAIClient;\n\
              import com.openai.client.okhttp.OpenAIOkHttpClient;\nimport com.openai.models.ChatModel;\n\
              import com.openai.models.chat.completions.ChatCompletion;\nimport com.openai.models.chat.completions.ChatCompletionCreateParams;\n\
              \npublic final class Main {\n    private Main() {}\n\n    public static\
              \ void main(String[] args) {\n        OpenAIClient client = OpenAIOkHttpClient.fromEnv();\n\
              \n        ChatCompletionCreateParams params = ChatCompletionCreateParams.builder()\n\
              \            .addDeveloperMessage(\"string\")\n            .model(ChatModel.GPT_4O)\n\
              \            .build();\n        ChatCompletion chatCompletion = client.chat().completions().create(params);\n\
              \    }\n}"
            ruby: 'require "openai"


              openai = OpenAI::Client.new(api_key: "My API Key")


              chat_completion = openai.chat.completions.create(messages: [{content:
              "string", role: :developer}], model: :"gpt-4o")


              puts(chat_completion)'
