components:
  schemas:
    ApplyPatchToolParam:
      properties:
        type:
          type: string
          enum:
          - apply_patch
          description: The type of the tool. Always `apply_patch`.
          default: apply_patch
          x-stainless-const: true
      type: object
      required:
      - type
      title: Apply patch tool
      description: Allows the assistant to create, delete, or update files using unified
        diffs.
    ApproximateLocation:
      properties:
        type:
          type: string
          enum:
          - approximate
          description: The type of location approximation. Always `approximate`.
          default: approximate
          x-stainless-const: true
        country:
          anyOf:
          - type: string
            description: The two-letter [ISO country code](https://en.wikipedia.org/wiki/ISO_3166-1)
              of the user, e.g. `US`.
          - type: 'null'
        region:
          anyOf:
          - type: string
            description: Free text input for the region of the user, e.g. `California`.
          - type: 'null'
        city:
          anyOf:
          - type: string
            description: Free text input for the city of the user, e.g. `San Francisco`.
          - type: 'null'
        timezone:
          anyOf:
          - type: string
            description: The [IANA timezone](https://timeapi.io/documentation/iana-timezones)
              of the user, e.g. `America/Los_Angeles`.
          - type: 'null'
      type: object
      required:
      - type
    AutoCodeInterpreterToolParam:
      properties:
        type:
          type: string
          enum:
          - auto
          description: Always `auto`.
          default: auto
          x-stainless-const: true
        file_ids:
          items:
            type: string
          type: array
          maxItems: 50
          description: An optional list of uploaded files to make available to your
            code.
        memory_limit:
          anyOf:
          - $ref: '#/components/schemas/ContainerMemoryLimit'
            description: The memory limit for the code interpreter container.
          - type: 'null'
        network_policy:
          oneOf:
          - $ref: '#/components/schemas/ContainerNetworkPolicyDisabledParam'
          - $ref: '#/components/schemas/ContainerNetworkPolicyAllowlistParam'
          description: Network access policy for the container.
      type: object
      required:
      - type
      title: CodeInterpreterToolAuto
      description: Configuration for a code interpreter container. Optionally specify
        the IDs of the files to run the code on.
    ChatCompletionAllowedTools:
      type: object
      title: Allowed tools
      description: 'Constrains the tools available to the model to a pre-defined set.

        '
      properties:
        mode:
          type: string
          enum:
          - auto
          - required
          description: 'Constrains the tools available to the model to a pre-defined
            set.


            `auto` allows the model to pick from among the allowed tools and generate
            a

            message.


            `required` requires the model to call one or more of the allowed tools.

            '
        tools:
          type: array
          description: "A list of tool definitions that the model should be allowed\
            \ to call.\n\nFor the Chat Completions API, the list of tool definitions\
            \ might look like:\n```json\n[\n  { \"type\": \"function\", \"function\"\
            : { \"name\": \"get_weather\" } },\n  { \"type\": \"function\", \"function\"\
            : { \"name\": \"get_time\" } }\n]\n```\n"
          items:
            type: object
            x-oaiExpandable: false
            description: 'A tool definition that the model should be allowed to call.

              '
            additionalProperties: true
      required:
      - mode
      - tools
    ChatCompletionAllowedToolsChoice:
      type: object
      title: Allowed tools
      description: 'Constrains the tools available to the model to a pre-defined set.

        '
      properties:
        type:
          type: string
          enum:
          - allowed_tools
          description: Allowed tool configuration type. Always `allowed_tools`.
          x-stainless-const: true
        allowed_tools:
          $ref: '#/components/schemas/ChatCompletionAllowedTools'
      required:
      - type
      - allowed_tools
    ChatCompletionFunctionCallOption:
      type: object
      description: 'Specifying a particular function via `{"name": "my_function"}`
